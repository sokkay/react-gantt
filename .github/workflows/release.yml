name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22.14+ / npm 11.5.1+ required for npm Trusted Publishing (OIDC).
          # Do NOT set registry-url here: it writes a placeholder NODE_AUTH_TOKEN
          # into .npmrc and blocks the OIDC token exchange (surfaces as E404 on publish).
          node-version: 24
          cache: 'pnpm'

      - name: Upgrade npm
        # Pin to npm 11: npm@latest (12+) requires Node ^22.22.2 || ^24.15.0.
        # npm 11.5.1+ is enough for OIDC trusted publishing.
        run: npm install -g npm@11

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
